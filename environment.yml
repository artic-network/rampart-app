name: artic-rampart
channels:
  - conda-forge
  - defaults
dependencies:
  - python>=3.9
  - nodejs>=18
  - pip:
    - mappy>=2.24

# Note: nodejs is only needed for development.
# For users, only Python 3.9+ and mappy are required.
# 
# Simpler alternative without conda:
#   1. Ensure Python 3.9+ is installed
#   2. pip install mappy




