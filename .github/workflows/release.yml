name: Build and Release

# Trigger on version tags: v1.2.3 or v1.2.3-beta.1
on:
  push:
    tags:
      - 'v*'

jobs:
  # ─── macOS build (signed + notarized) ───────────────────────────────────────
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Decode signing certificate
        run: echo "${{ secrets.PROD_MACOS_CERTIFICATE }}" | base64 --decode > /tmp/certificate.p12

      - name: Build and sign macOS app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: /tmp/certificate.p12
          CSC_KEY_PASSWORD: ${{ secrets.PROD_MACOS_CERTIFICATE_PWD }}
        run: npm run dist:mac

      - name: Notarize macOS app
        env:
          APPLE_ID: ${{ secrets.PROD_MACOS_NOTARIZATION_APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.PROD_MACOS_NOTARIZATION_PWD }}
          APPLE_TEAM_ID: ${{ secrets.PROD_MACOS_NOTARIZATION_TEAM_ID }}
        run: |
          APP_PATH="dist/mac/RAMPART.app"
          DMG_PATH=$(ls dist/*.dmg | head -1)
          echo "Notarizing $DMG_PATH"
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --output-format json
          echo "Stapling $DMG_PATH"
          xcrun stapler staple "$DMG_PATH"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-artifacts
          path: |
            dist/*.dmg
            dist/*.blockmap
            dist/latest-mac.yml

  # ─── Windows build ──────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Setup Python (for building mappy wheel)
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install zlib and pthreads (required to compile mappy)
        run: vcpkg install zlib:x64-windows pthreads:x64-windows

      - name: Install dependencies
        run: npm ci

      - name: Bundle Python embeddable with mappy
        shell: pwsh
        run: |
          $PYTHON_VERSION = "3.12.2"
          $PYTHON_URL = "https://www.python.org/ftp/python/$PYTHON_VERSION/python-$PYTHON_VERSION-embed-amd64.zip"
          $PYTHON_DIR = "resources\python\win32"

          # Point MSVC to vcpkg's zlib headers + libs so mappy can compile
          $env:INCLUDE = "C:\vcpkg\installed\x64-windows\include;$env:INCLUDE"
          $env:LIB     = "C:\vcpkg\installed\x64-windows\lib;$env:LIB"

          # mappy's linker asks for 'z.lib' (Unix name) but vcpkg installs 'zlib.lib' — alias it
          Copy-Item "C:\vcpkg\installed\x64-windows\lib\zlib.lib" "C:\vcpkg\installed\x64-windows\lib\z.lib"

          # mappy also links against 'pthread.lib' but vcpkg installs it as 'pthreadVC*.lib' — alias it
          $pthreadLib = Get-ChildItem "C:\vcpkg\installed\x64-windows\lib\pthread*.lib" | Select-Object -First 1
          if ($pthreadLib) {
            Write-Host "Aliasing $($pthreadLib.FullName) -> pthread.lib"
            Copy-Item $pthreadLib.FullName "C:\vcpkg\installed\x64-windows\lib\pthread.lib"
          } else {
            Write-Error "No pthread*.lib found in vcpkg lib - pthreads install may have failed"
          }

          Write-Host "vcpkg lib contents:"; Get-ChildItem "C:\vcpkg\installed\x64-windows\lib" | Where-Object { $_.Name -match "z|pthread" }

          # mappy also links against 'm.lib' (Unix math lib) which doesn't exist on MSVC — create a stub
          # (MSVC includes math functions in the CRT, so m.lib can be an empty archive)
          $vsPath = & "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          $msvcRoot = Get-ChildItem "$vsPath\VC\Tools\MSVC" -Directory | Sort-Object Name -Descending | Select-Object -First 1 -ExpandProperty FullName
          $clExe  = "$msvcRoot\bin\HostX64\x64\cl.exe"
          $libExe = "$msvcRoot\bin\HostX64\x64\lib.exe"
          Write-Host "Using cl.exe:  $clExe"
          Write-Host "Using lib.exe: $libExe"
          Set-Content -Path "m_stub.c" -Value "void __m_math_stub(void){}"
          & $clExe /c /nologo /MD m_stub.c /Fom_stub.obj
          & $libExe /nologo /out:"C:\vcpkg\installed\x64-windows\lib\m.lib" m_stub.obj
          Remove-Item m_stub.c, m_stub.obj -ErrorAction SilentlyContinue
          Write-Host "m.lib stub created at C:\vcpkg\installed\x64-windows\lib\m.lib"

          # Build mappy wheel using the full actions/setup-python (has MSVC + now zlib)
          pip install wheel
          pip wheel mappy --wheel-dir ./mappy_wheels -v

          # Download and extract Python embeddable package
          Invoke-WebRequest -Uri $PYTHON_URL -OutFile python-embed.zip
          Expand-Archive python-embed.zip -DestinationPath $PYTHON_DIR
          Remove-Item python-embed.zip

          # Enable site-packages so pip-installed packages are importable
          $PTH_FILE = "$PYTHON_DIR\python312._pth"
          (Get-Content $PTH_FILE) -replace '#import site', 'import site' | Set-Content $PTH_FILE

          # Bootstrap pip into the embeddable Python
          Invoke-WebRequest -Uri "https://bootstrap.pypa.io/get-pip.py" -OutFile "$PYTHON_DIR\get-pip.py"
          & "$PYTHON_DIR\python.exe" "$PYTHON_DIR\get-pip.py" --no-warn-script-location

          # Install the pre-built mappy wheel into the embeddable Python (no compilation)
          & "$PYTHON_DIR\python.exe" -m pip install mappy --find-links ./mappy_wheels --no-index --no-warn-script-location

          # Copy DLLs that mappy.pyd depends on at runtime
          Copy-Item "C:\vcpkg\installed\x64-windows\bin\zlib1.dll" "$PYTHON_DIR\"
          Copy-Item "C:\vcpkg\installed\x64-windows\bin\pthread*.dll" "$PYTHON_DIR\"

          # Verify
          & "$PYTHON_DIR\python.exe" -c "import mappy; print('mappy', mappy.__version__, 'bundled successfully')"

      - name: Build Windows app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-artifacts
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml

  # ─── Linux build ────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Linux app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.blockmap
            dist/latest-linux.yml

  # ─── Create GitHub Release with all artifacts ───────────────────────────────
  release:
    needs: [build-mac, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: mac-artifacts
          path: dist/mac

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: win-artifacts
          path: dist/win

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-artifacts
          path: dist/linux

      - name: List artifacts
        run: find dist -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/mac/*.dmg
            dist/mac/*.blockmap
            dist/mac/latest-mac.yml
            dist/win/*.exe
            dist/win/*.blockmap
            dist/win/latest.yml
            dist/linux/*.AppImage
            dist/linux/*.deb
            dist/linux/*.blockmap
            dist/linux/latest-linux.yml
          generate_release_notes: true
          draft: false
          # Tags containing a hyphen (e.g. v1.2.3-beta.1) are pre-releases
          prerelease: ${{ contains(github.ref_name, '-') }}
