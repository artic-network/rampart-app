name: Build and Release

# Trigger on version tags: v1.2.3 or v1.2.3-beta.1
on:
  push:
    tags:
      - 'v*'

jobs:
  # ─── macOS build (signed + notarized) ───────────────────────────────────────
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Decode signing certificate
        run: echo "${{ secrets.PROD_MACOS_CERTIFICATE }}" | base64 --decode > /tmp/certificate.p12

      - name: Build and sign macOS app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: /tmp/certificate.p12
          CSC_KEY_PASSWORD: ${{ secrets.PROD_MACOS_CERTIFICATE_PWD }}
        run: npm run dist:mac

      - name: Notarize macOS app
        env:
          APPLE_ID: ${{ secrets.PROD_MACOS_NOTARIZATION_APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.PROD_MACOS_NOTARIZATION_PWD }}
          APPLE_TEAM_ID: ${{ secrets.PROD_MACOS_NOTARIZATION_TEAM_ID }}
        run: |
          APP_PATH="dist/mac/RAMPART.app"
          DMG_PATH=$(ls dist/*.dmg | head -1)
          echo "Notarizing $DMG_PATH"
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --output-format json
          echo "Stapling $DMG_PATH"
          xcrun stapler staple "$DMG_PATH"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-artifacts
          path: |
            dist/*.dmg
            dist/*.blockmap
            dist/latest-mac.yml

  # ─── Windows build ──────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download minimap2 for Windows
        shell: pwsh
        run: |
          $MM2_VERSION = "2.28"
          $MM2_URL = "https://github.com/lh3/minimap2/releases/download/v$MM2_VERSION/minimap2-${MM2_VERSION}_win64.zip"
          Write-Host "Downloading minimap2 $MM2_VERSION for Windows..."
          Invoke-WebRequest -Uri $MM2_URL -OutFile minimap2-win.zip
          Expand-Archive minimap2-win.zip -DestinationPath minimap2-win
          $mm2Exe = Get-ChildItem minimap2-win -Recurse -Filter "minimap2.exe" | Select-Object -First 1
          Copy-Item $mm2Exe.FullName "resources\bin\win32\minimap2.exe"
          Write-Host "minimap2.exe installed to resources\bin\win32\"

      - name: Build Windows app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-artifacts
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml

  # ─── Linux build ────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download minimap2 for Linux
        run: |
          MM2_VERSION="2.28"
          curl -fsSL "https://github.com/lh3/minimap2/releases/download/v${MM2_VERSION}/minimap2-${MM2_VERSION}_x64-linux.tar.bz2" \
            | tar -jxf - --wildcards "*/minimap2" --strip-components=1
          chmod +x minimap2
          mv minimap2 resources/bin/linux/minimap2
          echo "minimap2 installed to resources/bin/linux/"

      - name: Build Linux app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.blockmap
            dist/latest-linux.yml

  # ─── Create GitHub Release with all artifacts ───────────────────────────────
  release:
    needs: [build-mac, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: mac-artifacts
          path: dist/mac

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: win-artifacts
          path: dist/win

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-artifacts
          path: dist/linux

      - name: List artifacts
        run: find dist -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/mac/*.dmg
            dist/mac/*.blockmap
            dist/mac/latest-mac.yml
            dist/win/*.exe
            dist/win/*.blockmap
            dist/win/latest.yml
            dist/linux/*.AppImage
            dist/linux/*.deb
            dist/linux/*.blockmap
            dist/linux/latest-linux.yml
          generate_release_notes: true
          draft: false
          # Tags containing a hyphen (e.g. v1.2.3-beta.1) are pre-releases
          prerelease: ${{ contains(github.ref_name, '-') }}
